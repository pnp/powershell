name: Nightly Release to Docker Hub

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'

permissions: read-all

jobs:
  publish-docker-windows-amd64:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4

      - name: Build Windows AMD64 image
        run: |
          $VERSION="$(cat ./version.txt)-nightly"
          docker build `
            --platform windows/amd64 `
            ./docker `
            -f ./docker/windows-amd64.dockerfile `
            -t ${{ secrets.DOCKER_ORG }}/powershell:$VERSION-windows-amd64

      - name: Push Windows AMD64 image
        run: |
          $VERSION="$(cat ./version.txt)-nightly"
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p '${{ secrets.DOCKER_PASSWORD }}'
          docker push ${{ secrets.DOCKER_ORG }}/powershell:$VERSION-windows-amd64


  publish-docker-linux-arm32:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        run: |
          VERSION="$(cat ./version.txt)-nightly"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build ARM32 image (NO manifest)
        run: |
          docker buildx build \
            --platform linux/arm/v7 \
            --load \
            -f ./docker/linux-arm32.dockerfile \
            -t ${{ secrets.DOCKER_ORG }}/powershell:${{ env.VERSION }}-linux-arm32 \
            ./docker

      - name: Push ARM32 image
        run: |
          docker push ${{ secrets.DOCKER_ORG }}/powershell:${{ env.VERSION }}-linux-arm32


  publish-docker-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Build Linux ARM64 image
        run: |
          VERSION="$(cat ./version.txt)-nightly"
          docker build \
            --platform linux/arm64/v8 \
            ./docker \
            -f ./docker/linux-arm64.dockerfile \
            -t ${{ secrets.DOCKER_ORG }}/powershell:$VERSION-linux-arm64

      - name: Push Linux ARM64 image
        run: |
          VERSION="$(cat ./version.txt)-nightly"
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p '${{ secrets.DOCKER_PASSWORD }}'
          docker push ${{ secrets.DOCKER_ORG }}/powershell:$VERSION-linux-arm64


  publish-docker-linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Linux AMD64 image
        run: |
          VERSION="$(cat ./version.txt)-nightly"
          docker build \
            --platform linux/amd64 \
            ./docker \
            -f ./docker/linux-amd64.dockerfile \
            -t ${{ secrets.DOCKER_ORG }}/powershell:$VERSION-linux-amd64

      - name: Push Linux AMD64 image
        run: |
          VERSION="$(cat ./version.txt)-nightly"
          docker login -u ${{ secrets.DOCKER_USERNAME }} -p '${{ secrets.DOCKER_PASSWORD }}'
          docker push ${{ secrets.DOCKER_ORG }}/powershell:$VERSION-linux-amd64


  publish-docker-manifest:
    runs-on: ubuntu-latest
    needs:
      - publish-docker-linux-arm64
      - publish-docker-linux-amd64
      - publish-docker-windows-amd64
    steps:
      - uses: actions/checkout@v4

      - name: Publish multi-arch manifest
        run: |
          VERSION="$(cat ./version.txt)-nightly"
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

          docker manifest create ${{ secrets.DOCKER_ORG }}/powershell:$VERSION \
            --amend ${{ secrets.DOCKER_ORG }}/powershell:$VERSION-linux-amd64 \
            --amend ${{ secrets.DOCKER_ORG }}/powershell:$VERSION-linux-arm64 \
            --amend ${{ secrets.DOCKER_ORG }}/powershell:$VERSION-windows-amd64

          docker manifest push ${{ secrets.DOCKER_ORG }}/powershell:$VERSION

          docker manifest create ${{ secrets.DOCKER_ORG }}/powershell:nightly \
            --amend ${{ secrets.DOCKER_ORG }}/powershell:$VERSION-linux-amd64 \
            --amend ${{ secrets.DOCKER_ORG }}/powershell:$VERSION-linux-arm64 \
            --amend ${{ secrets.DOCKER_ORG }}/powershell:$VERSION-windows-amd64

          docker manifest push ${{ secrets.DOCKER_ORG }}/powershell:nightly
